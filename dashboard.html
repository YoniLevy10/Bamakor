<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#C41E3A">
    <meta name="description" content="Bamakor Ticket Management System">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%23C41E3A' width='192' height='192'/><text x='50%' y='50%' font-size='100' fill='white' text-anchor='middle' dy='.3em'>🏢</text></svg>">
    <title>Bamakor Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue';
            background: linear-gradient(135deg, #3F3F3F 0%, #2a2a2a 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        .container { max-width: 1400px; margin: auto; }
        header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border-left: 5px solid #C41E3A;
        }
        h1 { 
            color: #3F3F3F;
            font-size: 32px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            border-top: 4px solid #C41E3A;
        }
        .stat-label { 
            color: #666; 
            font-size: 14px; 
            margin-bottom: 10px; 
            font-weight: 500;
        }
        .stat-number { 
            font-size: 36px; 
            font-weight: bold; 
            color: #C41E3A; 
        }
        .table-wrapper {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background: linear-gradient(135deg, #3F3F3F 0%, #2a2a2a 100%);
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }
        td {
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
        }
        tr:hover { background: #f8f8f8; }
        .status-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
        }
        .status-open {
            background: #FFEBEE;
            color: #C41E3A;
            border: 1px solid #C41E3A;
        }
        .status-closed {
            background: #E8F5E9;
            color: #2E7D32;
            border: 1px solid #2E7D32;
        }
        .btn { 
            background: #C41E3A; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn:hover { 
            background: #A01730;
            box-shadow: 0 5px 15px rgba(196, 30, 58, 0.3);
        }
        .loading { text-align: center; padding: 40px; }
        .spinner {
            border: 4px solid #f0f0f0;
            border-top: 4px solid #C41E3A;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Mobile Responsive */
        @media (max-width: 768px) {
            body { padding: 10px; }
            header {
                flex-direction: column;
                gap: 15px;
                padding: 20px;
            }
            h1 { font-size: 24px; }
            .stats {
                grid-template-columns: 1fr;
            }
            table { font-size: 12px; }
            td, th { padding: 10px 8px; }
            .stat-number { font-size: 28px; }
            .btn { padding: 8px 12px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏢 Bamakor Dashboard</h1>
            <button class="btn" onclick="loadData()">🔄 Refresh</button>
        </header>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">Total Tickets</div>
                <div class="stat-number" id="total">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Open</div>
                <div class="stat-number" id="open">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Closed</div>
                <div class="stat-number" id="closed">0</div>
            </div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Ticket ID</th>
                        <th>Phone</th>
                        <th>Street</th>
                        <th>Building</th>
                        <th>Apartment</th>
                        <th>Issue</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="tbody">
                    <tr class="loading"><td colspan="8"><div class="spinner"></div>Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW not available'));
        }

        async function loadData() {
            try {
                const res = await fetch('/api/tickets');
                const data = await res.json();
                
                console.log('Response:', data);
                
                if (!data.ok || !data.tickets) {
                    throw new Error('Invalid response format');
                }

                const tickets = data.tickets;
                
                document.getElementById('total').textContent = tickets.length;
                document.getElementById('open').textContent = tickets.filter(t => t.status === 'פתוח').length;
                document.getElementById('closed').textContent = tickets.filter(t => t.status === 'סגור').length;
                
                document.getElementById('tbody').innerHTML = tickets.map(t => `
                    <tr>
                        <td><strong>${t.ticketId}</strong></td>
                        <td>${t.phone}</td>
                        <td>${t.street}</td>
                        <td>${t.building}</td>
                        <td>${t.apartment}</td>
                        <td>${t.issue}</td>
                        <td>
                            <button class="status-btn status-${t.status === 'סגור' ? 'closed' : 'open'}">
                                ${t.status === 'סגור' ? '✓ Closed' : '⏳ Open'}
                            </button>
                        </td>
                        <td><button class="btn" onclick="toggleStatus('${t.ticketId}', '${t.status}')">Toggle</button></td>
                    </tr>
                `).join('');
            } catch(e) {
                console.error('Error:', e);
                document.getElementById('tbody').innerHTML = '<tr><td colspan="8" style="text-align:center;color:red;">Error loading data</td></tr>';
            }
        }

        async function toggleStatus(id, status) {
            const newStatus = status === 'סגור' ? 'פתוח' : 'סגור';
            try {
                const res = await fetch('/api/tickets/status', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ticketId: id, status: newStatus})
                });
                const data = await res.json();
                if (data.ok) {
                    loadData();
                } else {
                    alert('Error updating status');
                }
            } catch(e) {
                console.error('Error:', e);
                alert('Error updating status');
            }
        }

        loadData();
        setInterval(loadData, 600000);
    </script>
</body>
</html>
