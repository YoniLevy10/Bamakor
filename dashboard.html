<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        body {
            background-color: #121212;
            color: #FFFFFF;
            font-family: Arial, sans-serif;
            transition: background-color 0.5s, color 0.5s;
        }
        .toggle {
            cursor: pointer;
            padding: 10px 20px;
            background-color: #FF4081;
            border: none;
            border-radius: 5px;
            color: white;
        }
        .status {
            padding: 10px;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        .status.good {
            background-color: #4CAF50;
        }
        .status.bad {
            background-color: #F44336;
        }
        .status.warning {
            background-color: #FF9800;
        }
    </style>
</head>
<body>
    <h1>Dashboard</h1>
    <button class="toggle">Toggle Dark Mode</button>
    <div id="status-indicators">
        <div class="status good">All Systems Operational</div>
        <div class="status warning">Warning: High CPU Usage</div>
        <div class="status bad">Error: Database Connection Lost</div>
    </div>
    <script>
        const toggle = document.querySelector('.toggle');
        toggle.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            const bgColor = document.body.classList.contains('dark') ? '#121212' : '#FFFFFF';
            const textColor = document.body.classList.contains('dark') ? '#FFFFFF' : '#000000';
            document.body.style.backgroundColor = bgColor;
            document.body.style.color = textColor;
        });

        function refreshData() {
            // Add logic to refresh the dashboard data
            console.log('Data refreshed');
        }

        setInterval(refreshData, 10 * 60 * 1000); // Refresh every 10 minutes
    </script>
</body>
</html>
